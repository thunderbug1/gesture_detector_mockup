<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Vectors - Directional Gesture Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d15;
            --panel-bg: rgba(25, 25, 40, 0.85);
            --accent-color: #ff5f7d;
            --glow-color: rgba(255, 95, 125, 0.5);
            --text-primary: #ffe0e0;
            --text-secondary: #c0a0a0;
            --success-color: #ffaa00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(60, 30, 30, 0.2) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        header {
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow-color);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            display: flex;
            padding: 1rem 2rem 2rem;
            gap: 2rem;
            position: relative;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            pointer-events: none;
        }

        .panel {
            background: rgba(20, 15, 15, 0.95);
            border: 1px solid rgba(255, 95, 125, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .panel h3 {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255, 95, 125, 0.2);
            padding-bottom: 0.5rem;
        }

        #vector-display {
            font-family: 'Fira Code', monospace;
            background: #000;
            padding: 1rem;
            border-radius: 6px;
            color: var(--success-color);
            font-size: 0.8rem;
            min-height: 60px;
            word-break: break-all;
            margin-bottom: 1rem;
            border: 1px solid #333;
        }

        .recipe {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .recipe-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
        }

        button {
            background: rgba(255, 95, 125, 0.2);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .compass {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
        }

        .compass-arrow {
            width: 2px;
            height: 40px;
            background: var(--accent-color);
            transform-origin: bottom center;
            position: absolute;
            bottom: 50%;
            transition: transform 0.1s;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Recognition flash animation */
        @keyframes flash-red {
            0% { box-shadow: 0 0 0px var(--accent-color); }
            50% { box-shadow: 0 0 40px var(--accent-color); }
            100% { box-shadow: 0 0 0px var(--accent-color); }
        }

        .recognized {
            animation: flash-red 0.6s ease-out;
        }

    </style>
</head>
<body>

    <header>
        <h1>Vector Scribing</h1>
        <p class="subtitle">Directional String Recognition (Arx Fatalis Style)</p>
    </header>

    <main>
        <div id="canvas-container">
            <canvas id="vector-canvas"></canvas>
            
            <div class="compass">
                <div class="compass-arrow" id="compass-arrow"></div>
                <div style="position: absolute; top: -15px; font-size: 10px;">N</div>
                <div style="position: absolute; right: -15px; font-size: 10px;">E</div>
                <div style="position: absolute; bottom: -15px; font-size: 10px;">S</div>
                <div style="position: absolute; left: -15px; font-size: 10px;">W</div>
            </div>

            <div id="controls">
                <button id="clear-btn">Clear Canvas</button>
            </div>
        </div>

        <div id="ui-overlay">
            <div class="panel">
                <h3>Vector Stream</h3>
                <div id="vector-display">Waiting for input...</div>
                <div id="status-text" style="font-size: 0.9rem; font-weight: bold; text-align: center;">-</div>
            </div>

            <div class="panel">
                <h3>Spell Recipes</h3>
                <div id="recipes-list">
                    <!-- Recipes will be populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * Directional Vector Recognizer
         */
        const VectorRecognizer = (() => {
            const DIRECTIONS = ['E', 'SE', 'S', 'SW', 'W', 'NW', 'N', 'NE'];
            const THRESHOLD = 15; // Minimum pixels to move to record a direction

            function getDirection(dx, dy) {
                let angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (angle < 0) angle += 360;
                
                // Offset by 22.5 to center the slices
                const index = Math.floor(((angle + 22.5) % 360) / 45);
                return {
                    name: DIRECTIONS[index],
                    angle: angle
                };
            }

            function simplify(stream) {
                if (stream.length === 0) return "";
                
                // 1. Collapse consecutive duplicates (e.g. S S S -> S)
                let collapsed = [stream[0]];
                for (let i = 1; i < stream.length; i++) {
                    if (stream[i] !== stream[i-1]) {
                        collapsed.push(stream[i]);
                    }
                }
                
                // 2. Remove redundant intermediate directions (e.g. S, SE, E -> S, E)
                // This cleans up "jittery" curves into cleaner vector paths
                if (collapsed.length < 3) return collapsed.join("");
                
                let result = [collapsed[0]];
                for (let i = 1; i < collapsed.length - 1; i++) {
                    const prev = collapsed[i-1];
                    const curr = collapsed[i];
                    const next = collapsed[i+1];
                    
                    const iP = DIRECTIONS.indexOf(prev);
                    const iC = DIRECTIONS.indexOf(curr);
                    const iN = DIRECTIONS.indexOf(next);
                    
                    // Check if current direction is exactly between neighbors
                    const d1 = Math.min(Math.abs(iP - iC), 8 - Math.abs(iP - iC));
                    const d2 = Math.min(Math.abs(iC - iN), 8 - Math.abs(iC - iN));
                    const dT = Math.min(Math.abs(iP - iN), 8 - Math.abs(iP - iN));
                    
                    if (d1 === 1 && d2 === 1 && dT === 2) {
                        // Skip the intermediate step
                        continue;
                    }
                    result.push(curr);
                }
                result.push(collapsed[collapsed.length - 1]);
                
                return result.join("");
            }

            return {
                getDirection,
                simplify,
                THRESHOLD
            };
        })();

        const App = {
            canvas: null,
            ctx: null,
            isDrawing: false,
            lastPoint: null,
            stream: [],
            recipes: {
                "Fireball": "ENW", // Square-ish but specific
                "Shield": "ESWN", // Square
                "Heal": "SWNE", // Z-shape
                "Bolt": "SWS",   // Lightning
                "Slash": "E",     // Simple line
                "Peak": "NESW",   // Triangle/Caret
                "Spiral": "ESWNESWN" // Circle approximation
            },

            init() {
                this.canvas = document.getElementById('vector-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();

                window.addEventListener('resize', () => this.resize());

                this.canvas.addEventListener('pointerdown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('pointermove', (e) => this.draw(e));
                this.canvas.addEventListener('pointerup', (e) => this.stopDrawing(e));

                document.getElementById('clear-btn').addEventListener('click', () => this.clear());

                this.renderRecipes();
            },

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.clear();
            },

            startDrawing(e) {
                this.isDrawing = true;
                
                // Clear previous stroke
                this.clear();

                this.lastPoint = { x: e.offsetX, y: e.offsetY };
                this.stream = [];
                this.ctx.beginPath();
                this.ctx.moveTo(e.offsetX, e.offsetY);
                this.ctx.strokeStyle = '#ff5f7d';
                this.ctx.lineWidth = 5;
                this.ctx.lineJoin = 'round';
                this.ctx.lineCap = 'round';
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#ff5f7d';
                
                document.getElementById('vector-display').innerText = "";
                document.getElementById('status-text').innerText = "Casting...";
            },

            draw(e) {
                if (!this.isDrawing) return;
                
                const dx = e.offsetX - this.lastPoint.x;
                const dy = e.offsetY - this.lastPoint.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > VectorRecognizer.THRESHOLD) {
                    const dir = VectorRecognizer.getDirection(dx, dy);
                    this.stream.push(dir.name);
                    this.lastPoint = { x: e.offsetX, y: e.offsetY };
                    
                    // Update compass
                    document.getElementById('compass-arrow').style.transform = `rotate(${dir.angle + 90}deg)`;
                    
                    // Update display
                    document.getElementById('vector-display').innerText = VectorRecognizer.simplify(this.stream);
                }

                this.ctx.lineTo(e.offsetX, e.offsetY);
                this.ctx.stroke();
            },

            stopDrawing() {
                if (!this.isDrawing) return;
                this.isDrawing = false;
                
                const simplified = VectorRecognizer.simplify(this.stream);
                this.matchRecipe(simplified);
            },

            matchRecipe(input) {
                let matchFound = null;
                for (const [name, recipe] of Object.entries(this.recipes)) {
                    if (input === recipe) {
                        matchFound = name;
                        break;
                    }
                }

                const status = document.getElementById('status-text');
                const container = document.getElementById('canvas-container');

                if (matchFound) {
                    status.innerText = `SPELL CAST: ${matchFound.toUpperCase()}!`;
                    status.style.color = "var(--success-color)";
                    container.classList.add('recognized');
                    setTimeout(() => container.classList.remove('recognized'), 600);
                    
                    // Glow effect on canvas
                    this.ctx.strokeStyle = "var(--success-color)";
                    this.ctx.shadowColor = "var(--success-color)";
                    this.ctx.stroke();
                } else if (input.length > 0) {
                    status.innerText = "FIZZLE... No recipe match.";
                    status.style.color = "var(--text-secondary)";
                } else {
                    this.clear();
                }
            },

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.shadowBlur = 0;
                document.getElementById('vector-display').innerText = "Waiting for input...";
                document.getElementById('status-text').innerText = "-";
                document.getElementById('status-text').style.color = "white";
            },

            renderRecipes() {
                const list = document.getElementById('recipes-list');
                for (const [name, recipe] of Object.entries(this.recipes)) {
                    const div = document.createElement('div');
                    div.className = 'recipe';
                    div.innerHTML = `<span class="recipe-name">${name}</span><span>${recipe}</span>`;
                    list.appendChild(div);
                }
            }
        };

        App.init();
    </script>
</body>
</html>
